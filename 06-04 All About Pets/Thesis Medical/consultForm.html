	<section class="container" id="form">
  
	
		<header><h1>Appointment Form</header></h1>
		<form action="connect-content.php" class="form" method = "post">

<!-- Owner Name  -->
			<div class="input-box owner">
				<label>Name of Owner</label>
				<div class="name-input">
				  <input id="firstname" name = "firstName" autocapitalize="off" style="text-transform: none;" type="text" placeholder="First Name" required />
				  <input autocapitalize="off" name = "middleName" style="text-transform: none;"type="text" placeholder="Last Name" required />
				  <input  autocapitalize="off" name = "lastName" style="text-transform: none;"type="text" placeholder="Middle Name"/>
				</div>
			  </div>
 <!-- Email  -->
	<div class="input-box email">
		<label>Email Address</label>
		<input id= "email"type="text" name = "email" autocapitalize="off" style="text-transform: none;" placeholder="Enter Email Address" required />
</div>
	  
<!-- Address  -->	  
		  <div class="input-box address">
			<label>Address</label>
			<input autocapitalize="off" name = "address" style="text-transform: none;" type="text" placeholder="Enter Address" required />
		  </div>

<!--Contact No -->
		  <div class="input-box contact">
			<label>Contact No</label>
			<input id = "contact" autocapitalize="off" name = "contact" style="text-transform: none;" type="text" placeholder="09X-XXXX-XXXX or XXXX-XXXX" required>
		  </div>
<!-- Name of Pet -->
		  <div class="input-box petName">
			<label>Name of Pet</label>
			<input  autocapitalize="off" name = "petName" style="text-transform: none;" type="text" placeholder="Enter Your Pet's Name" required />
		  </div>
<!-- Age of Pet  -->
		  <div class="input-box petAge">
			<label>How old is your pet?</label>
			<input autocapitalize="off" name = "age" style="text-transform: none;" type="text" pattern="\d*" placeholder="Enter Age of Pet">
		  </div>
<!-- Pet Species Type -->
		  <div class="input-box petType">
			<label>Species</label>
			<input autocapitalize="off" name = "petSpecies" style="text-transform: none;" type="text" placeholder="Enter Your Pet's Species" required />
		  </div>
<!-- Pet Breed Type  -->
		  <div class="input-box petBreed">
			<label>Breed (Specify)</label>
			<input  autocapitalize="off" name = "petBreed" style="text-transform: none;" type="text" placeholder="Enter Your Pet's Breed" required />
		  </div>
<!-- Color of Pet  -->
		  <div class="input-box petColor">
			<label>Color</label>
			<input  autocapitalize="off" name = "petColor" style="text-transform: none;" type="text" placeholder="Enter Your Pet's Color" required />
		  </div>
<!-- Marking of pet  -->
		  <div class="input-box petMarking">
			<label>Marking</label>
			<input  autocapitalize="off" name = "petMarks" style="text-transform: none;" type="text" autocapitalize="off" placeholder="Enter Your Pet Marking" required />
		  </div>
 <!-- Pet Gender : radio type -->
		  <div class="gender-box">
			<h3>Pet Gender</h3>
			<div class="gender-option">
			  <div class="gender">
				<input type="radio" id="Male" value ="Male" name="petgender" />
				<label for="male">Male</label>
			  </div>
			  <div class="gender">
				<input type="radio" id="Female" value ="Female" name="petgender" />
				<label for="female">Female</label>
			  </div>
			</div>
		  </div>
 <!-- Reason For Visiting  -->
		  <div class="input-box rVisit">
			<label>Reason for Visiting</label><br>
			<textarea autocapitalize="off" style="text-transform: none;" name = "reason" placeholder="Enter Your Reason For Visiting" required></textarea>
		  </div>


<!--Submit Btn  -->
<button class="btn" type="button" onclick="checkFields()"> Submit </button>

		  
		</form>
