	  <!-- form section starts -->
	<section class="container" id="form">
  
	
		<header><h1>Appointment Form</header></h1>
		<form action="feedback.html" class="form">

<!-- Name of Pet -->
<div class="input-box petName">
	<label>Name of Pet</label>
	<input  autocapitalize="off" style="text-transform: none;" type="text" placeholder="Enter your pet's name" required />
  </div>
  
 <!-- Email  -->
	<div class="input-box">
		<label>Email Address</label>
		<input id= "email"type="text" autocapitalize="off" style="text-transform: none;" placeholder="Enter email address" required />
</div>
	  
<!-- Address  -->	  
		  <div class="input-box address">
			<label>Address</label>
			<input autocapitalize="off" style="text-transform: none;" type="text" placeholder="Enter street address" required />
		  </div>


<!--Contact No -->
		  <div class="input-box">
			<label>Contact No</label>
			<input autocapitalize="off" style="text-transform: none;" type="text" pattern="[\d ()-]*" title="Please Enter a valid Contact Number" required>
		  </div>

<!-- Age of Pet  -->
		  <div class="input-box petAge">
			<label>How old is your pet?</label>
			<input autocapitalize="off" style="text-transform: none;" type="text" pattern="\d*" title="Please enter a valid age">
		  </div>
<!-- Pet Species Type -->
		  <div class="input-box petType">
			<label>Species</label>
			<input autocapitalize="off" style="text-transform: none;" type="text" placeholder="Enter your pet's species" required />
		  </div>

		  <div class="input-box petBreed">
			<label>Breed</label>
			<input  autocapitalize="off" style="text-transform: none;" type="text" placeholder="Enter your pet's breed" required />
		  </div>

		  <div class="input-box petColor">
			<label>Color</label>
			<input  autocapitalize="off" style="text-transform: none;" type="text" placeholder="Enter your pet's color" required />
		  </div>

		  <div class="input-box petMarking">
			<label>Marking</label>
			<input  autocapitalize="off" style="text-transform: none;" type="text" autocapitalize="off" placeholder="Enter your pet's marking" required />
		  </div>

		  <div class="gender-box">
			<h3>Pet Gender</h3>
			<div class="gender-option">
			  <div class="gender">
				<input type="radio" id="male" name="pet_gender" checked />
				<label for="male">Male</label>
			  </div>
			  <div class="gender">
				<input type="radio" id="female" name="pet_gender" />
				<label for="female">Female</label>
			  </div>
			</div>
		  </div>

		  <div class="input-box rVisit">
			<label>Reason for Visiting</label><br>
			<textarea autocapitalize="off" style="text-transform: none;" placeholder="Enter the reason for your visit" required></textarea>
		  </div>



<button class="btn" type="button" onclick="checkFields()"> Submit </button>

		  
		</form>
